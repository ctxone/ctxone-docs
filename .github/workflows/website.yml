name: Deploy website

# Build and deploy the Astro + Starlight site in ./website/ to GitHub
# Pages. Triggers on any push to main that touches the website source,
# the flat *.md docs the importer pulls from, or this workflow file.
#
# Pages action pattern — configure-pages → upload-pages-artifact →
# deploy-pages. Official path for GitHub Pages deploys from a custom
# build. See:
# https://docs.github.com/en/pages/getting-started-with-github-pages/configuring-a-publishing-source-for-your-github-pages-site#publishing-with-a-custom-github-actions-workflow

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '*.md'
      - '.github/workflows/website.yml'
  # Allow manual runs from the Actions tab for one-off redeploys
  # (e.g. after a brand asset swap that doesn't touch source).
  workflow_dispatch:

# Ensure only one deploy runs at a time. A new push to main during an
# in-flight build will queue behind the current one rather than fight
# for the Pages artifact slot.
concurrency:
  group: website-pages
  cancel-in-progress: false

# Pages write + id-token write are required by the official
# deploy-pages action. contents: read is enough for the checkout.
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Build
        # npm run build runs scripts/import-docs.mjs as a prebuild hook
        # so the imported docs tree under src/content/docs/ is
        # populated from ../*.md before `astro build` runs.
        run: npm run build
        env:
          # Astro picks this up for the `site` config. Overriding here
          # belts-and-braces the canonical URL in case we ever move to
          # a staging preview domain.
          SITE: https://ctxone.com

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
